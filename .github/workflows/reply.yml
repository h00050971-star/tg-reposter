name: Обработчик команд

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Кэш модели Ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-1b-v1

      - name: Установить Ollama и загрузить модель
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2:1b

      - name: Запустить обработчик
        run: python reply_handler.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}

      - name: Сохранить offset
        run: |
          git config user.name "reposter-bot"
          git config user.email "bot@noreply.github.com"
          git add last_update_id.txt || true
          git diff --staged --quiet || git commit -m "update offset"
          git push
